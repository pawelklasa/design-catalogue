function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o[0] : o;
          const l = typeof o === 'object' ? o[1] : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

function Controls({ theme, query, setQuery, activeCat, setActiveCat, view, setView, total, shown, sort, setSort }) {
  const T = THEMES[theme];
  const inputRef = useRefC(null);

  useEffectC(() => {
    const onKey = (e) => {
      if (e.key === "/" && document.activeElement?.tagName !== "INPUT") {
        e.preventDefault();
        inputRef.current?.focus();
      }
      if (e.key === "Escape") {
        if (document.activeElement === inputRef.current) inputRef.current.blur();
        setQuery("");
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [setQuery]);

      background: T.bg,
      borderBottom: `1px solid ${T.ink15}`,

function Detail({ entry, theme, onClose, allEntries }) {

    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";

  if (!entry) return null;

  const idx = allEntries.findIndex((x) => x.id === entry.id);

          <button onClick={onClose} className="mono"
            style={{ all: "unset", cursor: "pointer", fontSize: 11, color: T.ink70, letterSpacing: "0.08em", textTransform: "uppercase" }}>

        <div style={{ padding: "44px 48px 80px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 32, alignItems: "baseline", paddingBottom: 28, borderBottom: `1px solid ${T.ink15}`, marginBottom: 32 }}>
            <div className="mono" style={{ fontSize: 11, color: T.ink70, letterSpacing: "0.06em", whiteSpace: "nowrap" }}>
              <div style={{ color: T.ink40, fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>Call no.</div>
              {entry.id}
            </div>
            <div className="mono" style={{ fontSize: 10, color: T.accent, letterSpacing: "0.12em", textTransform: "uppercase", textAlign: "right" }}>
              {window.CATS[entry.cat].label}
            </div>
          </div>

          <h1 style={{ fontFamily: "'Inter Tight', sans-serif", fontWeight: 500, fontSize: 44, lineHeight: 1.04, letterSpacing: "-0.025em", margin: 0, color: T.ink }}>
            {entry.title}
          </h1>
          <p style={{ fontSize: 18, lineHeight: 1.45, color: T.ink70, marginTop: 18, marginBottom: 36, fontFamily: "'Inter Tight', sans-serif" }}>
            {entry.short}
          </p>

          <div className="serif" style={{ fontSize: 16, lineHeight: 1.55, color: T.ink, marginBottom: 40, maxWidth: 580 }}>
            {entry.body}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "180px 1fr", borderTop: `1px solid ${T.ink15}` }}>
            {[
              ["Year", entry.year],
              entry.when && ["Recorded", entry.when],
              entry.status && ["Status", entry.status],
              entry.company && ["Company", entry.company],
              entry.role && ["Role", entry.role],
              entry.tags && ["Tags", entry.tags.join(" · ")],
              entry.metrics && ["Metrics", entry.metrics.map(([k, v]) => `${k}: ${v}`).join("  /  ")],
              entry.refs && ["References", entry.refs.join("  /  ")],
              entry.download && ["File", `${entry.download} (${entry.size})`],
            ].filter(Boolean).map(([k, v]) => (
              <React.Fragment key={k}>
                <div className="mono" style={{
                  padding: "12px 0", fontSize: 10, color: T.ink40,

                  borderBottom: `1px solid ${T.ink08}`,

                <div className="mono" style={{

          {entry.download && (

<script type="text/babel" data-presets="react">
function seededRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function generateContributions() {
  const rng = seededRandom(8675309);
  const cells = [];
  const today = new Date(2026, 3, 28);
  const start = new Date(today);
  start.setDate(start.getDate() - 52 * 7 - today.getDay());

  for (let w = 0; w < 53; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(start);
      date.setDate(start.getDate() + w * 7 + d);
      if (date > today) { week.push(null); continue; }
      const dayBias = (d === 0 || d === 6) ? 0.45 : 1.0;
      const isBurst = (w >= 8 && w <= 14) || (w >= 28 && w <= 33) || (w >= 44 && w <= 50);
      const burstMul = isBurst ? 1.8 : 1.0;
      const r = rng() * dayBias * burstMul;
      let level = 0;
      if (r > 0.55) level = 1;
      if (r > 0.85) level = 2;
      if (r > 1.05) level = 3;
      if (r > 1.3) level = 4;
      const count = level === 0 ? 0 : Math.floor(r * 6 + level * 2);
      week.push({ date, level, count });
    }
    cells.push(week);
  }
  return cells;
}

const CONTRIB_DATA = generateContributions();

const RECENT_EVENTS = [
  { when: "2 hours ago", repo: "pawelklasa/Dev-Resources", action: "Pushed 1 commit", detail: "docs: add OKLCH references to color section" },
  { when: "Yesterday",   repo: "pawelklasa/showcase",      action: "Merged PR #12",   detail: "feat: catalog redirect from /portfolio" },
  { when: "2 days ago",  repo: "pawelklasa/JS-playground", action: "Pushed 4 commits", detail: "experiments with the View Transition API" },
  { when: "4 days ago",  repo: "getify/You-Dont-Know-JS",  action: "Opened issue #1842", detail: "ch3: minor errata in async generator example" },
  { when: "6 days ago",  repo: "pawelklasa/test",          action: "Pushed 2 commits", detail: "wip: claude-design experiments" },
  { when: "1 week ago",  repo: "pawelklasa/Dev-Resources", action: "Pushed 3 commits", detail: "added local-first databases section" },
  { when: "9 days ago",  repo: "pawelklasa/showcase",      action: "Merged PR #11",   detail: "fix: reduced-motion hero fallback" },
];

function ContribCell({ level, T, count, date }) {
  const levels = T.contribLevels || [T.ink08, "rgba(193,57,15,0.22)", "rgba(193,57,15,0.45)", "rgba(193,57,15,0.7)", T.accent];
  const bg = level === null ? "transparent" : levels[level];
  return (
    <div title={date ? `${count} contributions · ${date.toDateString()}` : ""}
      style={{
        width: 11, height: 11, background: bg,
        outline: level !== null ? `1px solid ${T.ink08}` : "none",
        outlineOffset: -1,
      }} />
  );
}

function ContributionGraph({ theme, compact }) {
  const T = window.THEMES[theme];
  const ramps = {
    paper:     [T.ink08, "rgba(31,67,128,0.2)",   "rgba(31,67,128,0.45)",   "rgba(31,67,128,0.72)",   T.accent],
    cream:     [T.ink08, "rgba(168,66,26,0.2)",   "rgba(168,66,26,0.45)",   "rgba(168,66,26,0.72)",   T.accent],
    sage:      [T.ink08, "rgba(45,93,58,0.2)",    "rgba(45,93,58,0.45)",    "rgba(45,93,58,0.72)",    T.accent],
    ochre:     [T.ink08, "rgba(193,57,15,0.2)",   "rgba(193,57,15,0.46)",   "rgba(193,57,15,0.74)",   T.accent],
    blush:     [T.ink08, "rgba(168,56,86,0.2)",   "rgba(168,56,86,0.46)",   "rgba(168,56,86,0.74)",   T.accent],
    ink:       [T.ink08, "rgba(255,90,31,0.25)",  "rgba(255,90,31,0.5)",    "rgba(255,90,31,0.78)",   T.accent],
    blueprint: [T.ink08, "rgba(255,209,102,0.25)","rgba(255,209,102,0.55)", "rgba(255,209,102,0.8)",  T.accent],
  };
  const Tx = { ...T, contribLevels: ramps[theme] || ramps.paper };

  const totalContribs = CONTRIB_DATA.flat().reduce((sum, c) => sum + (c?.count || 0), 0);
  const activeDays = CONTRIB_DATA.flat().filter((c) => c && c.count > 0).length;
  const longestStreak = (() => {
    let max = 0, cur = 0;
    for (const w of CONTRIB_DATA) for (const c of w) {
      if (!c) continue;
      if (c.count > 0) { cur++; max = Math.max(max, cur); } else cur = 0;
    }
    return max;
  })();

  const monthLabels = [];
  let lastMonth = -1;
  for (let w = 0; w < CONTRIB_DATA.length; w++) {
    const firstDay = CONTRIB_DATA[w].find(Boolean);
    if (!firstDay) continue;
    const m = firstDay.date.getMonth();
    if (m !== lastMonth && firstDay.date.getDate() <= 7) {
      monthLabels.push({ w, label: firstDay.date.toLocaleString("en", { month: "short" }) });
      lastMonth = m;
    }
  }

  const dayLabels = ["Mon", "Wed", "Fri"];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 24 }}>
        <div>
          <div className="mono" style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: T.accent, marginBottom: 6 }}>
            § FEED · Live
          </div>
          <div style={{ fontFamily: "'Inter Tight', sans-serif", fontSize: 32, letterSpacing: "-0.02em", color: T.ink }}>
            <span className="mono" style={{ fontSize: 24, color: T.ink, letterSpacing: "0.02em" }}>{totalContribs.toLocaleString()}</span>
            {" "}<span style={{ color: T.ink70, fontSize: 22 }}>contributions in the last year</span>
          </div>
          <div className="serif" style={{ fontStyle: "italic", color: T.ink70, marginTop: 6, fontSize: 14 }}>
            Pulled from <a href="https://github.com/pawelklasa" target="_blank" style={{ color: T.ink70 }}>github.com/pawelklasa</a>. Each square is a day.
          </div>
        </div>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.ink70, textAlign: "right", lineHeight: 1.7, display: "grid", gridTemplateColumns: "auto auto", columnGap: 14, rowGap: 2, justifyContent: "end", alignItems: "baseline" }}>
          <span style={{ color: T.ink40 }}>Active days</span>
          <span style={{ color: T.ink, fontSize: 12, justifySelf: "end" }}>{activeDays}</span>
          <span style={{ color: T.ink40 }}>Longest streak</span>
          <span style={{ color: T.ink, fontSize: 12, justifySelf: "end" }}>{longestStreak} days</span>
          <span style={{ color: T.ink40 }}>Public repos</span>
          <span style={{ color: T.ink, fontSize: 12, justifySelf: "end" }}>101</span>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 2, paddingTop: 18 }}>
          {[0, 2, 4].map((rowIdx) => (
            <div key={rowIdx} className="mono" style={{ height: 11 + (rowIdx === 0 ? 0 : 24), display: "flex", alignItems: "flex-end", fontSize: 9, color: T.ink40, letterSpacing: "0.05em" }}>
              {dayLabels[Math.floor(rowIdx / 2)]}
            </div>
          ))}
        </div>
        <div style={{ flex: 1, overflowX: "auto" }}>
          <div style={{ position: "relative", height: 14, marginBottom: 4 }}>
            {monthLabels.map(({ w, label }) => (
              <div key={w} className="mono" style={{
                position: "absolute", left: w * 13,
                fontSize: 9, color: T.ink40, letterSpacing: "0.08em", textTransform: "uppercase",
              }}>{label}</div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {CONTRIB_DATA.map((week, w) => (
              <div key={w} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                {week.map((cell, d) => (
                  <ContribCell key={d} level={cell?.level ?? null} count={cell?.count} date={cell?.date} T={Tx} />
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="mono" style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 18, fontSize: 9, color: T.ink40, letterSpacing: "0.08em", textTransform: "uppercase", justifyContent: "flex-end" }}>
        <span>Less</span>
        {[0, 1, 2, 3, 4].map((l) => (
          <div key={l} style={{ width: 11, height: 11, background: ramps[theme][l], outline: `1px solid ${T.ink08}`, outlineOffset: -1 }} />
        ))}
        <span>More</span>
      </div>

      {!compact && (
        <div style={{ marginTop: 40, borderTop: `1px solid ${T.ink15}`, paddingTop: 24 }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: T.ink40, marginBottom: 16 }}>
            Recent activity
          </div>
          <div>
            {RECENT_EVENTS.map((ev, i) => (
              <div key={i} style={{
                display: "grid",
                gridTemplateColumns: "120px 240px 140px 1fr",
                gap: 24,
                padding: "12px 0",
                borderBottom: `1px solid ${T.ink08}`,
                alignItems: "baseline",
              }}>
                <span className="mono" style={{ fontSize: 10, color: T.ink40, letterSpacing: "0.06em", textTransform: "uppercase" }}>{ev.when}</span>
                <a href={`https://github.com/${ev.repo}`} target="_blank" className="mono" style={{ fontSize: 11, color: T.ink, letterSpacing: "0.02em", textDecoration: "none" }}>{ev.repo}</a>
                <span className="mono" style={{ fontSize: 10, color: T.accent, letterSpacing: "0.06em", textTransform: "uppercase" }}>{ev.action}</span>
                <span style={{ fontSize: 13, color: T.ink70 }}>{ev.detail}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

window.ContributionGraph = ContributionGraph;
</script>

        </div>
      ) : (
        <form onSubmit={onSubmit} style={{ display: "flex", border: `1px solid ${T.ink}`, minWidth: 320 }}>
          <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder="your@email.com"
            style={{ all: "unset", flex: 1, padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: T.ink, caretColor: T.accent }} />
          <button type="submit" className="mono" style={{ all: "unset", cursor: "pointer", padding: "0 18px", fontSize: 10, color: T.bg, background: T.ink, letterSpacing: "0.12em", textTransform: "uppercase", display: "flex", alignItems: "center" }}>
            Subscribe →
          </button>
        </form>
      )}
    </section>
  );
}

window.NewsletterCard = NewsletterCard;
</script>

<!-- App -->
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

const TWEAK_DEFAULTS = {
  "theme": "paper",
  "view": "index",
  "density": "cozy",
  "showCover": true
};

function App() {
  const [tweaks, setTweak] = (window.useTweaks || (() => [TWEAK_DEFAULTS, () => {}]))(TWEAK_DEFAULTS);
  const T = window.THEMES[tweaks.theme] || window.THEMES.paper;

  const [query, setQuery] = useState("");
  const [activeCat, setActiveCat] = useState("ALL");
  const [sort, setSort] = useState("recent");
  const [open, setOpen] = useState(null);

  useEffect(() => {
    document.body.style.background = T.bg;
    document.body.style.color = T.ink;
  }, [tweaks.theme]);

  const filtered = useMemo(() => {
    let list = window.ENTRIES.slice();
    if (activeCat !== "ALL") list = list.filter((e) => e.cat === activeCat);
    if (query.trim()) {
      const q = query.toLowerCase();
      list = list.filter((e) =>
        e.title.toLowerCase().includes(q) ||
        e.short.toLowerCase().includes(q) ||
        (e.body || "").toLowerCase().includes(q) ||
        e.id.toLowerCase().includes(q) ||
        (e.tags || []).some((t) => t.toLowerCase().includes(q))
      );
    }
    if (sort === "az") list.sort((a, b) => a.title.localeCompare(b.title));
    else if (sort === "id") list.sort((a, b) => a.id.localeCompare(b.id));
    else list.sort((a, b) => (b.year || 0) - (a.year || 0));
    return list;
  }, [activeCat, query, sort]);

  const byCat = useMemo(() => {
    const c = {};
    window.ENTRIES.forEach((e) => { c[e.cat] = (c[e.cat] || 0) + 1; });
    return c;
  }, []);

  const onJump = (cat) => {
    setActiveCat(cat);
    window.scrollTo({ top: window.innerHeight * 0.6, behavior: "smooth" });
  };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink }}>
      <header style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "14px 48px",
        borderBottom: `1px solid ${T.ink15}`,
        background: T.bg,
        gap: 24, flexWrap: "wrap",
      }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: T.ink70, display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
          <span style={{ color: T.ink, fontSize: 11 }}>Klasa, P.</span>
          <span style={{ color: T.ink15 }}>│</span>
          <span style={{ color: T.ink40 }}>Founder</span>
          <a href="https://scoraq.com/info" target="_blank" style={{ color: T.accent, textDecoration: "none", fontWeight: 500, letterSpacing: "0.06em" }}>Scoraq ↗</a>
          <span style={{ color: T.ink15 }}>│</span>
          <span style={{ color: T.ink40 }}>Sr. Designer, Hazelcast</span>
        </div>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.ink70, display: "flex", gap: 18, alignItems: "center" }}>
          <a href="https://github.com/pawelklasa" target="_blank" style={{ color: T.ink70, textDecoration: "none" }}>GitHub ↗</a>
          <a href="https://medium.com/@pawel.klasa" target="_blank" style={{ color: T.ink70, textDecoration: "none" }}>Medium ↗</a>
          <a href="https://pavka.design" target="_blank" style={{ color: T.ink70, textDecoration: "none" }}>pavka.design ↗</a>
          <span style={{ color: T.ink15 }}>│</span>
          <a href="mailto:hello@pavka.design" style={{ color: T.ink, textDecoration: "none" }}>hello@pavka.design</a>
        </div>
      </header>

      {tweaks.showCover && (
        <window.Cover theme={tweaks.theme} total={window.ENTRIES.length} byCat={byCat} onJump={onJump} />
      )}

      {tweaks.showCover && window.NewsletterCard && (
        <window.NewsletterCard theme={tweaks.theme} variant="band" />
      )}

      <window.Controls
        theme={tweaks.theme}
        query={query} setQuery={setQuery}
        activeCat={activeCat} setActiveCat={setActiveCat}
        view={tweaks.view} setView={(v) => setTweak("view", v)}
        sort={sort} setSort={setSort}
        total={window.ENTRIES.length} shown={filtered.length}
      />

      {activeCat !== "ALL" && activeCat !== "FEED" && (
        <div style={{ padding: "32px 48px 8px", borderBottom: `1px solid ${T.ink08}` }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: T.accent, marginBottom: 8 }}>
            § {activeCat}
          </div>
          <div style={{ fontFamily: "'Inter Tight', sans-serif", fontSize: 32, letterSpacing: "-0.02em", color: T.ink }}>
            {window.CATS[activeCat].label}
          </div>
          <div className="serif" style={{ fontStyle: "italic", color: T.ink70, marginTop: 6, fontSize: 15 }}>
            {window.CATS[activeCat].desc}
          </div>
        </div>
      )}

      {activeCat === "FEED" && window.ContributionGraph && (
        <div style={{ padding: "40px 48px 56px", borderBottom: `1px solid ${T.ink15}` }}>
          <window.ContributionGraph theme={tweaks.theme} />
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{ padding: "120px 48px", textAlign: "center", color: T.ink40 }} className="mono">
          <div style={{ fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase" }}>
            no records · ({String(filtered.length).padStart(3, "0")} ⁄ {String(window.ENTRIES.length).padStart(3, "0")})
          </div>
        </div>
      ) : tweaks.view === "card" ? (
        <window.CardView entries={filtered} theme={tweaks.theme} onOpen={setOpen} />
      ) : tweaks.view === "table" ? (
        <window.TableView entries={filtered} theme={tweaks.theme} onOpen={setOpen} />
      ) : (
        <window.IndexView entries={filtered} theme={tweaks.theme} onOpen={setOpen} density={tweaks.density} />
      )}

      <footer style={{
        marginTop: 80,
        borderTop: `1px solid ${T.ink15}`,
        padding: "40px 48px 60px",
        display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 32,
      }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.ink40, lineHeight: 1.8 }}>
          <div style={{ color: T.ink, marginBottom: 4 }}>Colophon</div>
          Set in Inter Tight &amp; JetBrains Mono.<br />
          Body text in Source Serif 4.<br />
          Composed in HTML.
        </div>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.ink40, lineHeight: 1.8 }}>
          <div style={{ color: T.ink, marginBottom: 4 }}>Terms</div>
          All entries CC BY-SA 4.0.<br />
          Tools as marked, mostly MIT.<br />
          Contact for commercial work.
        </div>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: T.ink40, lineHeight: 1.8, textAlign: "right" }}>
          <div style={{ color: T.ink, marginBottom: 4 }}>Errata</div>
          Last revised Apr 2026.<br />
          Maintained by the author.<br />
          <span style={{ color: T.accent }}>Always in print.</span>
        </div>
      </footer>

      <window.Detail entry={open} theme={tweaks.theme} onClose={() => setOpen(null)} allEntries={filtered} />

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Display">
            <window.TweakSelect label="Theme" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
              options={[["paper", "Paper · cool blue"], ["sage", "Sage"], ["blush", "Blush"], ["ochre", "Ochre"], ["cream", "Cream"], ["ink", "Ink · dark"], ["blueprint", "Blueprint"]]} />
            <window.TweakRadio label="View" value={tweaks.view} onChange={(v) => setTweak("view", v)}
              options={[["index", "Index"], ["card", "Cards"], ["table", "Table"]]} />
            <window.TweakRadio label="Density" value={tweaks.density} onChange={(v) => setTweak("density", v)}
              options={[["compact", "Compact"], ["cozy", "Cozy"], ["archival", "Archival"]]} />
            <window.TweakToggle label="Show cover & manifesto" value={tweaks.showCover} onChange={(v) => setTweak("showCover", v)} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
